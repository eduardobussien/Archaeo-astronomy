<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archaeo Sky | Ancient Night Sky Explorer</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: 100vh;
      background: #080c14;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    aside {
      background: #0d1117;
      border-right: 1px solid #21262d;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 24px 20px;
      gap: 22px;
    }

    .logo {
      text-align: center;
    }
    .logo h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #f0c040;
    }
    .logo p {
      font-size: 0.72rem;
      color: #8b949e;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    hr { border: none; border-top: 1px solid #21262d; }

    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #f0c040;
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      color: #8b949e;
      margin-bottom: 5px;
    }

    select, input[type="number"] {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-size: 0.85rem;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus, input[type="number"]:focus {
      border-color: #f0c040;
    }

    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .slider-wrap { display: flex; flex-direction: column; gap: 6px; }
    .slider-wrap .value-display {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e6edf3;
      text-align: center;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: #30363d;
      border-radius: 4px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #f0c040;
      cursor: pointer;
    }

    #view-btn {
      width: 100%;
      padding: 10px;
      background: #f0c040;
      color: #080c14;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #view-btn:hover { opacity: 0.85; }
    #view-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .method-badge {
      text-align: center;
      font-size: 0.7rem;
      color: #8b949e;
      padding: 4px 8px;
      background: #161b22;
      border-radius: 4px;
      border: 1px solid #21262d;
    }
    .method-badge span { color: #58a6ff; font-weight: 600; }

    .sky-description {
      font-size: 0.78rem;
      color: #c9d1d9;
      line-height: 1.6;
      padding: 10px 12px;
      background: #161b22;
      border-left: 3px solid #f0c040;
      border-radius: 0 4px 4px 0;
    }

    .star-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px;
    }
    .star-card-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 2px;
    }
    .star-card-constellation {
      font-size: 0.7rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .star-card-stats {
      display: flex;
      gap: 12px;
      font-size: 0.75rem;
      color: #8b949e;
      margin-bottom: 8px;
    }
    .star-card-stats strong { color: #c9d1d9; }
    .star-card-note {
      font-size: 0.73rem;
      color: #8b949e;
      line-height: 1.5;
      font-style: italic;
      border-top: 1px solid #21262d;
      padding-top: 8px;
    }

    .monument-note {
      font-size: 0.72rem;
      color: #8b949e;
      line-height: 1.5;
      padding: 8px;
      background: #161b22;
      border-left: 3px solid #f0c040;
      border-radius: 0 4px 4px 0;
    }

    .sidebar-footer {
      margin-top: auto;
      font-size: 0.68rem;
      color: #484f58;
      text-align: center;
      line-height: 1.6;
    }

    .preset-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 8px;
    }
    .preset-card:hover {
      border-color: #f0c040;
      background: #1c2128;
    }
    .preset-card h4 {
      font-size: 0.82rem;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 3px;
    }
    .preset-card p {
      font-size: 0.72rem;
      color: #8b949e;
      line-height: 1.4;
    }

    /* ── Main sky area ── */
    main {
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    #info-bar {
      background: #0d1117;
      border-bottom: 1px solid #21262d;
      padding: 8px 20px;
      font-size: 0.78rem;
      color: #8b949e;
      display: flex;
      gap: 24px;
      align-items: center;
      flex-shrink: 0;
    }
    #info-bar strong { color: #f0c040; }

    #sky-chart {
      flex: 1;
      min-height: 0;
    }

    #empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #484f58;
      pointer-events: none;
    }
    #empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    #empty-state p { font-size: 0.9rem; }
  </style>
</head>
<body>

<aside>
  <div class="logo">
    <h1>ARCHAEO SKY</h1>
    <p>Ancient Night Sky Explorer</p>
  </div>

  <hr />

  <!-- Location -->
  <div>
    <div class="section-label">Location</div>
    <label>Ancient Site</label>
    <select id="site-select">
      <option value="">Custom coordinates</option>
    </select>
  </div>

  <div id="custom-loc">
    <div class="row2">
      <div>
        <label>Latitude</label>
        <input type="number" id="lat" value="29.9792" step="0.0001" min="-90" max="90" />
      </div>
      <div>
        <label>Longitude</label>
        <input type="number" id="lon" value="31.1342" step="0.0001" min="-180" max="180" />
      </div>
    </div>
  </div>

  <div id="monument-note" class="monument-note" style="display:none"></div>

  <hr />

  <!-- Date & Time -->
  <div>
    <div class="section-label">Date &amp; Time</div>

    <div class="slider-wrap">
      <label>Year</label>
      <div class="value-display" id="year-display">2,500 BC</div>
      <input type="range" id="year-slider" min="-12000" max="2024" step="50" value="-2500" />
    </div>

    <div class="row2" style="margin-top:14px">
      <div>
        <label>Month</label>
        <select id="month-select">
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3" selected>March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>
      </div>
      <div>
        <label>Day</label>
        <input type="number" id="day" value="20" min="1" max="31" />
      </div>
    </div>

    <div class="slider-wrap" style="margin-top:14px">
      <label>Hour (local)</label>
      <div class="value-display" id="hour-display">22:00</div>
      <input type="range" id="hour-slider" min="0" max="23.5" step="0.5" value="22" />
    </div>
  </div>

  <hr />

  <button id="view-btn">VIEW THE SKY</button>

  <div id="method-badge" class="method-badge" style="display:none">
    Calculation engine: <span id="method-label"></span>
  </div>

  <div id="sky-description" class="sky-description" style="display:none"></div>

  <div id="star-card" class="star-card" style="display:none">
    <div class="star-card-name" id="sc-name"></div>
    <div class="star-card-constellation" id="sc-const"></div>
    <div class="star-card-stats">
      <span>Alt <strong id="sc-alt"></strong></span>
      <span>Az <strong id="sc-az"></strong></span>
      <span>Mag <strong id="sc-mag"></strong></span>
    </div>
    <div class="star-card-note" id="sc-note" style="display:none"></div>
  </div>

  <hr />

  <!-- Try This presets -->
  <div>
    <div class="section-label">Try This</div>
    <div id="presets-list"></div>
  </div>

  <div class="sidebar-footer">
    Star positions calculated using<br />
    precession &amp; proper motion models.<br />
    Accuracy degrades before ~5000 BC.
  </div>
</aside>

<!-- Main sky panel -->
<main>
  <div id="info-bar" style="display:none">
    <span><strong id="ib-site"></strong></span>
    <span>JD: <strong id="ib-jd"></strong></span>
    <span>LST: <strong id="ib-lst"></strong>°</span>
    <span id="ib-visible"></span>
  </div>

  <div id="sky-chart"></div>

  <div id="empty-state">
    <div class="icon">✦</div>
    <p>Select a site and press <em>View the Sky</em></p>
  </div>
</main>

<script>
  // ── Constellation colours (matches the Python visualiser) ──
  const CONST_COLORS = {
    'Orion':       '#4fc3f7',
    'Canis Major': '#fff176',
    'Carina':      '#ce93d8',
    'Taurus':      '#ffb74d',
    'Lyra':        '#80deea',
    'Draco':       '#a5d6a7',
    'Ursa Minor':  '#ef9a9a',
    'Cygnus':      '#b39ddb',
    'Boötes':      '#ff8a65',
    'Leo':         '#f48fb1',
    'Virgo':       '#c5e1a5',
    'Scorpius':    '#ff5252',
    'Auriga':      '#ffc107',
    'Gemini':      '#b3e5fc',
    'Canis Minor': '#ccff90',
    'Eridanus':    '#78909c',
    'Piscis Austrinus': '#00bcd4',
    'Centaurus':   '#f06292',
    'Crux':        '#ffffff',
    'Ursa Major':  '#7986cb',
  };

  function magToSize(mag) {
    // Brighter (lower magnitude) = bigger dot
    return Math.max(6, (5 - mag) * 5);
  }

  function azToCardinal(az) {
    const dirs = ['north', 'northeast', 'east', 'southeast', 'south', 'southwest', 'west', 'northwest'];
    return dirs[Math.round(az / 45) % 8];
  }

  function updateDescription(data) {
    const el = document.getElementById('sky-description');
    const visible = Object.entries(data.stars).filter(([, s]) => s.visible);

    if (visible.length === 0) {
      el.textContent = 'No catalog stars are above the horizon at this time.';
      el.style.display = 'block';
      return;
    }

    const byBrightness = [...visible].sort(([, a], [, b]) => a.magnitude - b.magnitude);
    const top3 = byBrightness.slice(0, 3).map(([name, s]) => `${name} in the ${azToCardinal(s.azimuth)}`);

    let text = `${visible.length} stars above the horizon. Brightest: ${top3.join(', ')}.`;

    if (data.monument) {
      const az = data.monument.orientation_az;
      let nearest = null, minDiff = Infinity;
      for (const [name, s] of visible) {
        let diff = Math.abs(s.azimuth - az);
        if (diff > 180) diff = 360 - diff;
        if (diff < minDiff) { minDiff = diff; nearest = name; }
      }
      if (nearest && minDiff <= 15) {
        text += ` The monument aligns ${azToCardinal(az)} — near ${nearest} (${minDiff.toFixed(0)}° away).`;
      } else {
        text += ` The monument faces ${azToCardinal(az)}.`;
      }
    }

    const sun = data.planets && data.planets['Sun'];
    if (sun && sun.visible) {
      text += ' The Sun is above the horizon — this would be daytime.';
    }

    el.textContent = text;
    el.style.display = 'block';
  }

  function formatYear(y) {
    if (y < 0)  return Math.abs(y).toLocaleString() + ' BC';
    if (y === 0) return '1 BC';
    return y.toLocaleString() + ' AD';
  }

  function formatHour(h) {
    const hh = Math.floor(h).toString().padStart(2, '0');
    const mm = (h % 1 === 0.5) ? '30' : '00';
    return `${hh}:${mm}`;
  }

  // ── Preset examples ──
  const PRESETS = [
    {
      title: 'Orion Correlation',
      desc:  "Orion's Belt rises due east over Giza — Bauval's 10,500 BC theory",
      site:  'Great Pyramid of Giza',
      year: -10499, month: 3, day: 20, hour: 22,
    },
    {
      title: 'Thuban, the Pyramid Star',
      desc:  'The north star of 2700 BC, locked above the pyramid north shaft',
      site:  'Great Pyramid of Giza',
      year: -2700, month: 3, day: 20, hour: 22,
    },
    {
      title: 'Pleiades at Teotihuacan',
      desc:  "Pleiades sets at the pyramid's exact orientation azimuth, 150 AD",
      site:  'Pyramid of the Sun (Teotihuacan)',
      year: 150, month: 5, day: 17, hour: 5,
    },
    {
      title: 'Orion at Stonehenge',
      desc:  'Orion dominates the winter sky over Stonehenge, 2500 BC',
      site:  'Stonehenge',
      year: -2500, month: 12, day: 21, hour: 22,
    },
    {
      title: 'Sirius and the Nile Flood',
      desc:  'Sirius rises at dawn — Egyptian New Year and the start of the flood, 2780 BC',
      site:  'Great Pyramid of Giza',
      year: -2780, month: 7, day: 17, hour: 5,
    },
    {
      title: 'Göbekli Tepe at Night',
      desc:  "World's oldest temple, 9600 BC — Sirius low on the southern horizon",
      site:  'Göbekli Tepe',
      year: -9599, month: 6, day: 21, hour: 22,
    },
    {
      title: 'Newgrange Winter Solstice',
      desc:  'Solstice sunrise beam pierces the passage tomb, 3200 BC',
      site:  'Newgrange',
      year: -3200, month: 12, day: 21, hour: 9,
    },
    {
      title: 'Malta Equinox Sunrise',
      desc:  'First light of spring frames the Mnajdra temple doorway, 3600 BC',
      site:  'Mnajdra Temple (Malta)',
      year: -3600, month: 3, day: 20, hour: 6,
    },
  ];

  function applyPreset(preset) {
    document.getElementById('site-select').value = preset.site;
    onSiteChange();
    document.getElementById('year-slider').value = preset.year;
    document.getElementById('year-display').textContent = formatYear(preset.year);
    document.getElementById('month-select').value = preset.month;
    document.getElementById('day').value = preset.day;
    document.getElementById('hour-slider').value = preset.hour;
    document.getElementById('hour-display').textContent = formatHour(preset.hour);
    fetchAndRender();
  }

  const presetsList = document.getElementById('presets-list');
  PRESETS.forEach(preset => {
    const card = document.createElement('div');
    card.className = 'preset-card';
    card.innerHTML = `<h4>${preset.title}</h4><p>${preset.desc}</p>`;
    card.addEventListener('click', () => applyPreset(preset));
    presetsList.appendChild(card);
  });

  // ── Populate site dropdown ──
  fetch('/api/sites')
    .then(r => r.json())
    .then(sites => {
      const sel = document.getElementById('site-select');
      Object.entries(sites).forEach(([name, data]) => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        sel.appendChild(opt);
      });
      // Default to Great Pyramid
      sel.value = 'Great Pyramid of Giza';
      onSiteChange();
    });

  // ── Site dropdown change ──
  function onSiteChange() {
    const site = document.getElementById('site-select').value;
    const customLoc = document.getElementById('custom-loc');
    const noteEl = document.getElementById('monument-note');

    if (site === '') {
      customLoc.style.display = 'block';
      noteEl.style.display = 'none';
    } else {
      customLoc.style.display = 'none';
      // Show the monument note (fetch from cached sites data)
      fetch('/api/sites')
        .then(r => r.json())
        .then(sites => {
          if (sites[site]) {
            noteEl.textContent = sites[site].note;
            noteEl.style.display = 'block';
          }
        });
    }
  }
  document.getElementById('site-select').addEventListener('change', onSiteChange);

  // ── Slider display updates ──
  document.getElementById('year-slider').addEventListener('input', e => {
    document.getElementById('year-display').textContent = formatYear(+e.target.value);
  });
  document.getElementById('hour-slider').addEventListener('input', e => {
    document.getElementById('hour-display').textContent = formatHour(+e.target.value);
  });

  // ── Main fetch & render ──
  document.getElementById('view-btn').addEventListener('click', fetchAndRender);

  function fetchAndRender() {
    const btn = document.getElementById('view-btn');
    btn.disabled = true;
    btn.textContent = 'LOADING…';

    const site  = document.getElementById('site-select').value;
    const year  = document.getElementById('year-slider').value;
    const month = document.getElementById('month-select').value;
    const day   = document.getElementById('day').value;
    const hour  = document.getElementById('hour-slider').value;
    const lat   = document.getElementById('lat').value;
    const lon   = document.getElementById('lon').value;

    let url = `/api/stars?year=${year}&month=${month}&day=${day}&hour=${hour}`;
    if (site) {
      url += `&site=${encodeURIComponent(site)}`;
    } else {
      url += `&lat=${lat}&lon=${lon}`;
    }

    fetch(url)
      .then(r => r.json())
      .then(data => {
        renderChart(data);
        updateInfoBar(data);
        updateDescription(data);
        document.getElementById('empty-state').style.display = 'none';

        const badge = document.getElementById('method-badge');
        document.getElementById('method-label').textContent = data.meta.method;
        badge.style.display = 'block';
      })
      .catch(err => {
        console.error(err);
        alert('Error fetching star data. See console for details.');
      })
      .finally(() => {
        btn.disabled = false;
        btn.textContent = 'VIEW THE SKY';
      });
  }

  function updateInfoBar(data) {
    const bar = document.getElementById('info-bar');
    bar.style.display = 'flex';

    const yearStr = formatYear(data.meta.year);
    const site = data.monument ? data.monument.name : `${data.meta.lat}°, ${data.meta.lon}°`;
    document.getElementById('ib-site').textContent = `${site} | ${yearStr}`;
    document.getElementById('ib-jd').textContent = data.meta.jd.toFixed(1);
    document.getElementById('ib-lst').textContent = data.meta.lst.toFixed(2);

    const visCount = Object.values(data.stars).filter(s => s.visible).length;
    document.getElementById('ib-visible').textContent = `${visCount} stars visible`;
  }

  // Pairs of stars to connect with lines, grouped by constellation
  const CONSTELLATION_LINES = {
    'Orion':       [['Mintaka','Alnilam'], ['Alnilam','Alnitak'],   // belt
                    ['Betelgeuse','Alnitak'], ['Rigel','Mintaka']],  // body
    'Taurus':      [['Aldebaran','Alcyone']],
    'Gemini':      [['Castor','Pollux']],
    'Canis Major': [['Sirius','Adhara']],
    'Centaurus':   [['Alpha Centauri','Hadar']],
    'Crux':        [['Acrux','Mimosa']],
  };

  function makeConstellationLines(starsData) {
    const lineTraces = [];
    for (const [constName, pairs] of Object.entries(CONSTELLATION_LINES)) {
      for (const [a, b] of pairs) {
        const s1 = starsData[a];
        const s2 = starsData[b];
        if (!s1 || !s2) continue;
        const opacity = (s1.visible && s2.visible) ? 0.35 : 0.1;
        lineTraces.push({
          type: 'scatterpolar',
          r:     [90 - s1.altitude, 90 - s2.altitude],
          theta: [s1.azimuth,       s2.azimuth],
          mode:  'lines',
          line:  { color: CONST_COLORS[constName] || '#555', width: 1.2 },
          opacity,
          hoverinfo:  'skip',
          showlegend: false,
        });
      }
    }
    return lineTraces;
  }

  const PLANET_STYLE = {
    'Sun':     { color: '#FFD700', size: 26 },
    'Moon':    { color: '#E8E8CC', size: 20 },
    'Mercury': { color: '#A9A9A9', size:  9 },
    'Venus':   { color: '#FFFACD', size: 16 },
    'Mars':    { color: '#E05050', size: 12 },
    'Jupiter': { color: '#DEB887', size: 15 },
    'Saturn':  { color: '#DAA520', size: 13 },
  };

  const PLANET_NOTES = {
    'Sun':     'Above the horizon means daytime — stars would not be visible to the naked eye. Solstice and equinox sunrise/sunset alignments define many ancient monuments.',
    'Moon':    "The Moon's phases governed ancient calendars. A full Moon is bright enough to read by and washes out all but the brightest stars.",
    'Mercury': 'Always within 28° of the Sun — hard to observe. Ancient Egyptians may have recorded it as two separate objects: a morning star and an evening star.',
    'Venus':   'The brightest planet, outshining everything except the Sun and Moon. The Chichen Itza pyramid aligns to its extreme northern and southern positions.',
    'Mars':    'Its red color and retrograde loops puzzled ancient astronomers. Babylonians predicted its opposition cycles to within a few days.',
    'Jupiter': 'Brightest planet when Venus is below the horizon. Babylonian astronomers tracked its position for centuries to predict events.',
    'Saturn':  'The slowest naked-eye planet — 29 years per orbit. Ancient cultures across the world saw it as a symbol of time and fate.',
  };

  function makePlanetTraces(planets) {
    if (!planets || !Object.keys(planets).length) return [];
    const visible = Object.entries(planets).filter(([, p]) =>  p.visible);
    const hidden  = Object.entries(planets).filter(([, p]) => !p.visible);

    const makeTrace = (list, opacity) => ({
      type: 'scatterpolar',
      r:     list.map(([, p]) => 90 - p.altitude),
      theta: list.map(([, p]) => p.azimuth),
      mode:  'markers+text',
      text:  list.map(([name]) => name),
      textposition: 'top center',
      textfont: { color: `rgba(255,240,180,${opacity})`, size: 10 },
      marker: {
        size:    list.map(([name]) => (PLANET_STYLE[name] || {size: 10}).size),
        color:   list.map(([name]) => (PLANET_STYLE[name] || {color: '#fff'}).color),
        symbol: 'diamond',
        opacity,
        line: { color: 'rgba(255,255,255,0.4)', width: 1 },
      },
      customdata: list.map(([name, p]) => [
        p.altitude.toFixed(1), p.azimuth.toFixed(1), 'Planet', '',
      ]),
      hovertemplate: '<b>%{text}</b><br>Planet<br>Alt: %{customdata[0]}°  Az: %{customdata[1]}°<extra></extra>',
      showlegend: false,
    });

    const traces = [];
    if (visible.length) traces.push(makeTrace(visible, 0.95));
    if (hidden.length)  traces.push({ ...makeTrace(hidden, 0.2), mode: 'markers' });
    return traces;
  }

  const STAR_NOTES = {
    'Sirius':         'The brightest star in the sky. Its heliacal rising marked the Egyptian New Year and the annual Nile flood.',
    'Polaris':        'The current north star, within 1° of the celestial pole. It has only held this role since around 1100 AD.',
    'Thuban':         'The north star of the pyramid era (~2700 BC). It once shone directly down the descending passage of the Great Pyramid.',
    'Vega':           'Will become the north star around 13,700 AD due to precession. The brightest star in the summer northern sky.',
    'Antares':        'One of the four Royal Stars of Persia. Its name means "rival of Mars" — both are red and similarly bright.',
    'Aldebaran':      'One of the four Royal Stars of Persia, the "Eye of the Bull." Marks the face of Taurus.',
    'Regulus':        'One of the four Royal Stars of Persia, the "Heart of the Lion." Almost exactly on the ecliptic.',
    'Fomalhaut':      'One of the four Royal Stars of Persia, the "Autumn Star." It has a visible debris disk hinting at planets.',
    'Spica':          'By comparing its position over decades, Hipparchus discovered the precession of the equinoxes in ~127 BC.',
    'Betelgeuse':     'A red supergiant nearing the end of its life. It will explode as a supernova within the next 100,000 years.',
    'Rigel':          'A blue supergiant 60,000× more luminous than the Sun. Used for celestial navigation across many cultures.',
    'Canopus':        'Second brightest star in the sky. Used by ancient Egyptians for navigation and by NASA for spacecraft orientation today.',
    'Arcturus':       'One of the fastest-moving bright stars. Its light was used to switch on the lights at the 1933 Chicago World\'s Fair.',
    'Alpha Centauri': 'The closest star system to our Sun at 4.37 light-years. Likely hosts rocky planets.',
    'Hadar':          'Forms the "Southern Pointers" with Alpha Centauri, guiding navigators to the Southern Cross.',
    'Deneb':          'Despite looking similar to Vega, Deneb is ~2,600 light-years away — one of the most luminous stars known.',
    'Capella':        'Known as the "Goat Star," associated with the goat Amalthea who nursed Zeus in Greek myth.',
    'Procyon':        'Its name means "before the dog" in Greek — it rises just minutes before Sirius, the Dog Star.',
    'Alnitak':        'Eastern star of Orion\'s Belt. Robert Bauval linked it to the easternmost pyramid at Giza.',
    'Alnilam':        'Middle star of Orion\'s Belt, roughly 2,000 light-years away — the most distant of the three.',
    'Mintaka':        'Western star of Orion\'s Belt. It sits almost exactly on the celestial equator.',
    'Alcyone':        'Brightest of the Pleiades (Seven Sisters). Their rising and setting marked the agricultural calendar in cultures worldwide.',
    'Acrux':          'Brightest star in the Southern Cross. Used for southern hemisphere navigation for thousands of years.',
    'Mimosa':         'Second brightest star in the Southern Cross, essential for finding true south without a compass.',
    'Dubhe':          'The outer pointer star of the Big Dipper, which draws a line directly to Polaris.',
    'Adhara':         'Second brightest star in Canis Major after Sirius. In the far ultraviolet it is the brightest star in the sky.',
    'Achernar':       'Marks the southern end of the river Eridanus. A key navigation star for cultures of the southern hemisphere.',
    'Castor':         'A sextuple star system — six stars orbiting each other — that appears as one bright point to the eye.',
    'Pollux':         'The brighter of the Gemini twins. It has a confirmed planet, Pollux b, discovered in 2006.',
  };

  let starClickWired = false;

  function renderChart(data) {
    const entries = Object.entries(data.stars);
    const visible = entries.filter(([, s]) => s.visible);
    const hidden  = entries.filter(([, s]) => !s.visible);

    const makeTrace = (starList, opacity) => ({
      type: 'scatterpolar',
      r:     starList.map(([, s]) => 90 - s.altitude),
      theta: starList.map(([, s]) => s.azimuth),
      mode:  'markers+text',
      text:  starList.map(([name]) => name),
      textposition: 'top center',
      textfont: { color: 'rgba(200,210,220,' + opacity + ')', size: 10 },
      marker: {
        size:    starList.map(([, s]) => magToSize(s.magnitude)),
        color:   starList.map(([, s]) => CONST_COLORS[s.constellation] || '#e0e0e0'),
        opacity: opacity,
        line:    { width: 0 },
      },
      customdata: starList.map(([, s]) => [
        s.altitude.toFixed(1),
        s.azimuth.toFixed(1),
        s.constellation,
        s.magnitude.toFixed(2),
      ]),
      hovertemplate:
        '<b>%{text}</b><br>' +
        '%{customdata[2]}<br>' +
        'Alt: %{customdata[0]}°  Az: %{customdata[1]}°<br>' +
        'Mag: %{customdata[3]}' +
        '<extra></extra>',
      showlegend: false,
    });

    const traces = [
      ...makeConstellationLines(data.stars),
      ...makePlanetTraces(data.planets || {}),
      makeTrace(visible, 0.95),
      { ...makeTrace(hidden, 0.18), mode: 'markers' },
    ];

    // Monument orientation line
    if (data.monument) {
      const az = data.monument.orientation_az;
      traces.push({
        type: 'scatterpolar',
        r: [0, 90],
        theta: [az, az],
        mode: 'lines',
        line: { color: '#f0c040', width: 2, dash: 'dash' },
        hovertemplate: `<b>${data.monument.name}</b><br>Orientation: ${az}°<extra></extra>`,
        showlegend: false,
      });
      // Opposite direction (faint dotted)
      traces.push({
        type: 'scatterpolar',
        r: [0, 90],
        theta: [(az + 180) % 360, (az + 180) % 360],
        mode: 'lines',
        line: { color: '#f0c040', width: 1, dash: 'dot' },
        hoverinfo: 'skip',
        showlegend: false,
      });
    }

    const layout = {
      polar: {
        radialaxis: {
          range: [0, 90],
          tickvals: [30, 60, 90],
          ticktext: ['60°', '30°', 'Horizon'],
          tickfont: { color: '#8b949e', size: 9 },
          gridcolor: '#21262d',
          linecolor: '#21262d',
          showline: false,
        },
        angularaxis: {
          tickvals: [0, 45, 90, 135, 180, 225, 270, 315],
          ticktext: ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'],
          tickfont: { color: '#c9d1d9', size: 12, family: 'Segoe UI, sans-serif' },
          direction: 'clockwise',
          rotation: 90,
          gridcolor: '#21262d',
          linecolor: '#30363d',
        },
        bgcolor: '#0d1117',
      },
      paper_bgcolor: '#080c14',
      plot_bgcolor:  '#080c14',
      font: { color: '#c9d1d9', family: 'Segoe UI, sans-serif' },
      margin: { t: 40, b: 40, l: 60, r: 60 },
      showlegend: false,
      dragmode: false,
    };

    Plotly.react('sky-chart', traces, layout, {
      responsive: true,
      displayModeBar: false,
    });

    if (!starClickWired) {
      document.getElementById('sky-chart').on('plotly_click', function(eventData) {
        if (!eventData.points.length) return;
        const pt = eventData.points[0];
        const name = pt.text;
        const cd   = pt.customdata;
        if (!name || !cd) return;

        const [alt, az, type, mag] = cd;
        const isPlanet = type === 'Planet';

        document.getElementById('sc-name').textContent  = name;
        document.getElementById('sc-const').textContent = isPlanet ? 'Planet' : type;
        document.getElementById('sc-alt').textContent   = alt + '°';
        document.getElementById('sc-az').textContent    = az + '°';
        document.getElementById('sc-mag').textContent   = isPlanet ? '' : mag;

        const noteEl = document.getElementById('sc-note');
        const note   = isPlanet ? (PLANET_NOTES[name] || '') : (STAR_NOTES[name] || '');
        noteEl.textContent    = note;
        noteEl.style.display  = note ? 'block' : 'none';

        document.getElementById('star-card').style.display = 'block';
      });
      starClickWired = true;
    }
  }
</script>
</body>
</html>
